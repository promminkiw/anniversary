<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>🎉 Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="page-transition"></div>

    <main class="page-wrap">
        <!-- rings -->
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>

        <!-- floating hearts -->
        <span class="heart-float" style="left:15%;top:70%;animation-duration:5s;animation-delay:0s">🌸</span>
        <span class="heart-float" style="left:80%;top:65%;animation-duration:6.5s;animation-delay:1.5s">💗</span>
        <span class="heart-float" style="left:45%;top:75%;animation-duration:4.5s;animation-delay:3s">✿</span>
        <span class="heart-float" style="left:25%;top:60%;animation-duration:7s;animation-delay:2s">🌷</span>
        <span class="heart-float" style="left:70%;top:72%;animation-duration:5.5s;animation-delay:0.8s">💗</span>

        <p class="badge">✦ happy kamsai day ✦</p>

        <h1 class="main-title">
            Happy<br><em>birthday</em>
        </h1>

        <p class="subtitle">สุขสันต์วันเกิดเมียสุดที่รัก</p>

        <!-- <span class="year-badge">✦ 2 Years ✦</span> -->

        <div class="divider-ornament"><span>🤓</span></div>

        <div class="cta-group">
            <a href="letter.html" class="btn" onclick="navigateTo(event,'letter.html')">
                💌 อ่านจดหมาย
            </a>
            <a href="scratch.html" class="btn btn-outline" onclick="navigateTo(event,'scratch.html')">
                🕹️ มินิเกม
            </a>
        </div>

        <p class="names-line">— [ธีร์] & [แก้มใส] —</p>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active" onclick="navigateTo(event,'index.html')">
            <span class="nav-icon">🏠</span>
            <span>หน้าแรก</span>
        </a>
        <a href="letter.html" class="nav-item" onclick="navigateTo(event,'letter.html')">
            <span class="nav-icon">💌</span>
            <span>คำอวยพร</span>
        </a>
        <a href="scratch.html" class="nav-item" onclick="navigateTo(event,'scratch.html')">
            <span class="nav-icon">🕹️</span>
            <span>มินิเกม</span>
        </a>
        <a href="finale.html" class="nav-item" onclick="navigateTo(event,'finale.html')">
            <span class="nav-icon">🎉</span>
            <span>เซอร์ไพรส์</span>
        </a>
    </nav>

    <script>
        function navigateTo(e, url) {
            e.preventDefault();
            const overlay = document.getElementById('page-transition');
            overlay.classList.add('fade-out');
            setTimeout(() => { window.location.href = url; }, 320);
        }

        // fade in on load
        window.addEventListener('load', () => {
            const overlay = document.getElementById('page-transition');
            overlay.style.opacity = '1';
            overlay.style.transition = 'none';
            requestAnimationFrame(() => {
                overlay.style.transition = 'opacity 0.4s ease';
                overlay.style.opacity = '0';
            });

            // Typewriter effect on subtitle
            setTimeout(() => {
                const subtitle = document.querySelector('.subtitle');
                const text = subtitle.textContent;
                subtitle.textContent = '';
                subtitle.style.opacity = '1';
                subtitle.style.animation = 'none';
                let i = 0;
                const type = () => {
                    if (i < text.length) {
                        subtitle.textContent += text[i++];
                        setTimeout(type, 80);
                    }
                };
                setTimeout(type, 900);
            }, 500);

            // Falling petals
            launchPetals();
        });

        function launchPetals() {
            const petalEmojis = ['🌸', '🌷', '✿', '❀', '🌺'];
            const style = document.createElement('style');
            style.textContent = `
                @keyframes petalFall {
                    0% { transform: translateY(-20px) rotate(0deg) translateX(0); opacity: 0; }
                    10% { opacity: 0.7; }
                    90% { opacity: 0.4; }
                    100% { transform: translateY(105vh) rotate(360deg) translateX(60px); opacity: 0; }
                }
            `;
            document.head.appendChild(style);

            function spawnPetal() {
                const el = document.createElement('span');
                el.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
                const dur = 5 + Math.random() * 5;
                el.style.cssText = `
                    position:fixed; z-index:2; pointer-events:none;
                    left:${Math.random() * 100}vw; top:-30px;
                    font-size:${0.8 + Math.random() * 0.9}rem;
                    animation: petalFall ${dur}s ${Math.random() * 2}s linear forwards;
                    opacity:0;
                `;
                document.body.appendChild(el);
                setTimeout(() => el.remove(), (dur + 2) * 1000);
            }

            // spawn petals periodically
            for (let i = 0; i < 8; i++) setTimeout(spawnPetal, i * 600);
            setInterval(spawnPetal, 1800);
        }
    </script>
</body>

</html>
