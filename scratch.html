<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🕹️ ขูดเหรียญ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="scratch.css">
</head>

<body>
    <div id="page-transition"></div>

    <!-- Dot indicators -->
    <div class="dot-indicators" id="dotIndicators"></div>

    <!-- Full-screen slide stage -->
    <div class="scratch-stage" id="scratchStage"></div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item" onclick="navigateTo(event,'index.html')">
            <span class="nav-icon">🏠</span>
            <span>หน้าแรก</span>
        </a>
        <a href="letter.html" class="nav-item" onclick="navigateTo(event,'letter.html')">
            <span class="nav-icon">💌</span>
            <span>จดหมาย</span>
        </a>
        <a href="scratch.html" class="nav-item active" onclick="navigateTo(event,'scratch.html')">
            <span class="nav-icon">🕹️</span>
            <span>มินิเกม</span>
        </a>
        <a href="finale.html" class="nav-item" onclick="navigateTo(event,'finale.html')">
            <span class="nav-icon">🎉</span>
            <span>เซอร์ไพรส์</span>
        </a>
    </nav>

    <script>
        /* ── Page transitions ── */
        function navigateTo(e, url) {
            e.preventDefault();
            const overlay = document.getElementById('page-transition');
            overlay.classList.add('fade-out');
            setTimeout(() => { window.location.href = url; }, 320);
        }
        window.addEventListener('load', () => {
            const o = document.getElementById('page-transition');
            o.style.opacity = '1';
            o.style.transition = 'none';
            requestAnimationFrame(() => {
                o.style.transition = 'opacity 0.4s ease';
                o.style.opacity = '0';
            });
        });

        /*
         * ── Card data ──
         * img       = ไฟล์รูปที่จะถูก reveal (image1.png, image2.png, ...)
         * fallback* = แสดงถ้าโหลดรูปไม่ได้
         * coverPattern = รูปแบบลายบน cover: 'hearts' | 'stars' | 'clouds' | 'flowers' | 'waves'
         */
        const CARDS = [
            {
                title: '🌸 นี่ๆรูปที่เค้าชอบที่สุด',
                img: './img/Ttat3.jpg',
                fallbackEmoji: '🌸',
                fallbackLabel: 'วันแรกที่เจอกัน',
                coverColors: ['#f9c8bc', '#e8a898'],
                coverPattern: 'hearts',
                coverLabel: '💗 ขูดเพื่อเปิด',
                message: 'เค้าชอบรูปนี้เพราะว่าแฟนเค้าสวย 😍',
            },
        ];

        let currentSlide = 0;
        const totalCards = CARDS.length;
        const scratchedState = new Array(totalCards).fill(false);

        /* ── Build all slides ── */
        function buildSlides() {
            const stage = document.getElementById('scratchStage');
            const dotsWrap = document.getElementById('dotIndicators');

            CARDS.forEach((card, i) => {
                /* dot */
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dot.id = `dot-${i}`;
                dotsWrap.appendChild(dot);

                /* slide */
                const slide = document.createElement('div');
                slide.className = 'card-slide' + (i === 0 ? ' active' : '');
                slide.id = `slide-${i}`;

                slide.innerHTML = `
          <div class="slide-counter">${i + 1} / ${totalCards}</div>
          <div class="card-title"><em>${card.title}</em></div>

          <div class="scratch-area" id="area-${i}">
            <div class="reveal-layer" id="reveal-${i}"></div>
            <canvas class="scratch-canvas" id="canvas-${i}"></canvas>
          </div>

          <div class="scratch-hint" id="hint-${i}">💗 ขูดเพื่อเปิดภาพ</div>

          <div class="reveal-message" id="msg-${i}">
            <p>${card.message}</p>
          </div>

          <div class="next-btn" id="next-${i}">
            ${i < totalCards - 1
                        ? `<button class="btn" onclick="goToSlide(${i + 1})">ถัดไป →</button>`
                        : `<a href="finale.html" class="btn" onclick="navigateTo(event,'finale.html')">🎉 ดูเซอร์ไพรส์สุดท้าย</a>`
                    }
          </div>
        `;

                stage.appendChild(slide);

                /* fill reveal layer: try real image first, fallback to styled emoji bg */
                const revealLayer = slide.querySelector(`#reveal-${i}`);
                const img = new Image();
                img.alt = card.title;
                img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:20px;';

                img.onload = () => revealLayer.appendChild(img);
                img.onerror = () => {
                    const bg = document.createElement('div');
                    bg.className = 'emoji-bg';
                    bg.style.background = `linear-gradient(135deg, ${card.coverColors[0]}99, ${card.coverColors[1]}bb)`;
                    bg.innerHTML = `
            <div class="emoji-main">${card.fallbackEmoji}</div>
            <div class="emoji-label">${card.fallbackLabel}</div>
          `;
                    revealLayer.appendChild(bg);
                };
                img.src = card.img; /* set src after handlers */

                /* init scratch canvas with patterned cover */
                initScratch(i, card);
            });
        }

        /* ── Scratch logic ── */
        function initScratch(idx, card) {
            const area = document.getElementById(`area-${idx}`);
            const canvas = document.getElementById(`canvas-${idx}`);
            let ctx, isDrawing = false, done = false, lastX, lastY;

            function drawCover() {
                canvas.width = area.offsetWidth;
                canvas.height = area.offsetHeight;
                ctx = canvas.getContext('2d');

                /* gradient base */
                const grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, card.coverColors[0]);
                grad.addColorStop(1, card.coverColors[1]);
                ctx.fillStyle = grad;
                ctx.roundRect(0, 0, canvas.width, canvas.height, 20);
                ctx.fill();

                /* decorative pattern */
                drawPattern(ctx, canvas.width, canvas.height, card.coverPattern);

                /* center label */
                const fs = Math.max(15, canvas.width * 0.083);
                ctx.fillStyle = 'rgba(255,255,255,0.95)';
                ctx.font = `italic 600 ${fs}px "Cormorant Garamond", serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(0,0,0,0.18)';
                ctx.shadowBlur = 8;
                ctx.fillText(card.coverLabel, canvas.width / 2, canvas.height / 2);
                ctx.shadowBlur = 0;

                /* inner border */
                ctx.globalAlpha = 0.3;
                ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                ctx.lineWidth = 2;
                ctx.roundRect(5, 5, canvas.width - 10, canvas.height - 10, 15);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            /* ── Pattern drawing helpers ── */
            function drawPattern(ctx, w, h, type) {
                ctx.save();
                ctx.globalAlpha = 0.14;
                ctx.fillStyle = '#fff';

                if (type === 'hearts') {
                    const step = 38;
                    for (let row = 0, y = step / 2; y < h + step; row++, y += step) {
                        const offsetX = (row % 2) * (step / 2);
                        for (let x = offsetX - step / 2; x < w + step; x += step) {
                            drawHeart(ctx, x, y, 7);
                        }
                    }
                } else if (type === 'stars') {
                    const step = 34;
                    for (let row = 0, y = step / 2; y < h + step; row++, y += step) {
                        const offsetX = (row % 2) * (step / 2);
                        for (let x = offsetX; x < w + step; x += step) {
                            drawStar(ctx, x, y, 5, 2.5);
                        }
                    }
                } else if (type === 'clouds') {
                    for (let y = 20; y < h + 30; y += 40)
                        for (let x = -10; x < w + 30; x += 55) {
                            drawCloud(ctx, x + (y % 80 === 20 ? 0 : 27), y, 14);
                        }
                } else if (type === 'flowers') {
                    const step = 36;
                    for (let row = 0, y = step / 2; y < h + step; row++, y += step) {
                        const offsetX = (row % 2) * (step / 2);
                        for (let x = offsetX; x < w + step; x += step) {
                            drawFlower(ctx, x, y, 6);
                        }
                    }
                } else {
                    for (let y = 14; y < h; y += 22)
                        for (let x = 14; x < w; x += 22)
                            ctx.fillRect(x, y, 2.5, 2.5);
                }
                ctx.restore();
            }

            function drawHeart(ctx, cx, cy, r) {
                ctx.beginPath();
                ctx.moveTo(cx, cy + r * 0.35);
                ctx.bezierCurveTo(cx, cy - r * 0.25, cx - r, cy - r * 0.2, cx - r, cy + r * 0.25);
                ctx.bezierCurveTo(cx - r, cy + r * 0.9, cx, cy + r * 1.3, cx, cy + r * 1.3);
                ctx.bezierCurveTo(cx, cy + r * 1.3, cx + r, cy + r * 0.9, cx + r, cy + r * 0.25);
                ctx.bezierCurveTo(cx + r, cy - r * 0.2, cx, cy - r * 0.25, cx, cy + r * 0.35);
                ctx.fill();
            }

            function drawStar(ctx, cx, cy, outerR, innerR) {
                ctx.beginPath();
                for (let i = 0; i < 10; i++) {
                    const r = i % 2 === 0 ? outerR : innerR;
                    const a = (Math.PI / 5) * i - Math.PI / 2;
                    i === 0 ? ctx.moveTo(cx + r * Math.cos(a), cy + r * Math.sin(a))
                            : ctx.lineTo(cx + r * Math.cos(a), cy + r * Math.sin(a));
                }
                ctx.closePath(); ctx.fill();
            }

            function drawCloud(ctx, cx, cy, r) {
                ctx.beginPath();
                ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2);
                ctx.arc(cx + r * 0.75, cy + r * 0.15, r * 0.45, 0, Math.PI * 2);
                ctx.arc(cx - r * 0.5, cy + r * 0.15, r * 0.4, 0, Math.PI * 2);
                ctx.arc(cx + r * 0.25, cy + r * 0.35, r * 0.38, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawFlower(ctx, cx, cy, r) {
                for (let i = 0; i < 5; i++) {
                    const a = (Math.PI * 2 / 5) * i;
                    ctx.beginPath();
                    ctx.ellipse(cx + r * Math.cos(a), cy + r * Math.sin(a), r * 0.5, r * 0.28, a, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.beginPath(); ctx.arc(cx, cy, r * 0.32, 0, Math.PI * 2); ctx.fill();
            }

            /* ── Erase functions ── */
            function erase(x, y) {
                if (done) return;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 30, 0, Math.PI * 2);
                ctx.fill();
            }

            function eraseLine(x1, y1, x2, y2) {
                if (done) return;
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.lineWidth = 60;
                ctx.lineCap = 'round';
                ctx.stroke();
            }

            function checkDone() {
                if (done) return;
                const d = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
                let clear = 0;
                for (let i = 3; i < d.length; i += 4) if (d[i] < 64) clear++;
                if (clear / (canvas.width * canvas.height) > 0.5) {
                    done = true;
                    scratchedState[idx] = true;
                    canvas.style.opacity = '0';
                    setTimeout(() => canvas.style.display = 'none', 400);
                    onCardScratched(idx);
                }
            }

            function getXY(e) {
                const r = canvas.getBoundingClientRect();
                const s = e.touches ? e.touches[0] : e;
                return [s.clientX - r.left, s.clientY - r.top];
            }

            canvas.addEventListener('mousedown', e => { isDrawing = true; [lastX, lastY] = getXY(e); erase(lastX, lastY); checkDone(); });
            canvas.addEventListener('mousemove', e => {
                if (!isDrawing) return;
                const [x, y] = getXY(e);
                eraseLine(lastX, lastY, x, y);
                [lastX, lastY] = [x, y];
                checkDone();
            });
            canvas.addEventListener('mouseup', () => isDrawing = false);
            canvas.addEventListener('mouseleave', () => isDrawing = false);

            canvas.addEventListener('touchstart', e => {
                e.preventDefault(); isDrawing = true;
                [lastX, lastY] = getXY(e); erase(lastX, lastY); checkDone();
            }, { passive: false });
            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                if (!isDrawing) return;
                const [x, y] = getXY(e);
                eraseLine(lastX, lastY, x, y);
                [lastX, lastY] = [x, y];
                checkDone();
            }, { passive: false });
            canvas.addEventListener('touchend', () => isDrawing = false);

            const ro = new ResizeObserver(() => { if (!done) drawCover(); });
            ro.observe(area);
            setTimeout(drawCover, 80);
        }

        /* ── On card scratched ── */
        function onCardScratched(idx) {
            const hint = document.getElementById(`hint-${idx}`);
            hint.textContent = '✨ เปิดแล้ว!';
            hint.style.animationName = 'none';
            hint.style.color = 'var(--rose)';

            setTimeout(() => document.getElementById(`msg-${idx}`).classList.add('show'), 200);
            setTimeout(() => document.getElementById(`next-${idx}`).classList.add('show'), 500);

            document.getElementById(`dot-${idx}`)?.classList.add('done');
            launchConfetti(16);
        }

        /* ── Slide navigation ── */
        function goToSlide(idx) {
            if (idx < 0 || idx >= totalCards) return;
            const prev = document.getElementById(`slide-${currentSlide}`);
            const next = document.getElementById(`slide-${idx}`);

            prev.classList.remove('active');
            prev.classList.add('exit-left');
            next.classList.remove('exit-left');
            next.classList.add('active');

            document.getElementById(`dot-${currentSlide}`)?.classList.remove('active');
            document.getElementById(`dot-${idx}`)?.classList.add('active');

            currentSlide = idx;
            setTimeout(() => prev.classList.remove('exit-left'), 500);
        }

        /* ── Confetti ── */
        function launchConfetti(count = 40) {
            const cols = ['#e8a4a4', '#f5cfc8', '#c9a96e', '#f5d5b8', '#e8d0a0', '#d4736e', '#f9ddd5'];
            if (!document.getElementById('confetti-kf')) {
                const s = document.createElement('style');
                s.id = 'confetti-kf';
                s.textContent = `@keyframes confettiFall{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}`;
                document.head.appendChild(s);
            }
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    const size = 5 + Math.random() * 8;
                    el.style.cssText = `position:fixed;z-index:9999;pointer-events:none;left:${Math.random()*100}vw;top:-14px;width:${size}px;height:${size}px;background:${cols[Math.floor(Math.random()*cols.length)]};border-radius:${Math.random()>.45?'50%':'3px'};animation:confettiFall ${2+Math.random()*2}s ${Math.random()*0.3}s linear forwards;`;
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 4500);
                }, i * 40);
            }
        }

        /* ── Init ── */
        document.addEventListener('DOMContentLoaded', buildSlides);
    </script>
</body>

</html>
